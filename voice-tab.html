<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Voice &amp; Transcription</title>
    <link rel="icon" href="images/tab-logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #43A047;
            --primary-dark: #2E7D32;
            --primary-light: #E8F5E9;
            --accent: #FF6B6B;
            --bg: #F0F2F5;
            --surface: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --user-bubble: #43A047;
            --user-text: #FFFFFF;
            --ai-bubble: #FFFFFF;
            --ai-text: #1A1A2E;
            --system-text: #9CA3AF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ===== Header ===== */
        .header {
            background: var(--primary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: var(--shadow-md);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            overflow: hidden;
        }

        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
        }

        .status-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: background 0.3s;
        }

        .status-indicator.connected {
            background: #4ADE80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
        }

        /* (header-btn removed – single button in input area) */

        /* ===== Chat Area ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 10px;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .empty-state-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .empty-state-desc {
            font-size: 0.85rem;
            max-width: 280px;
            line-height: 1.5;
        }

        /* Message rows */
        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeInUp 0.25s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user,
        .msg-row.user-transcript {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.assistant {
            align-self: flex-start;
        }

        .msg-row.system {
            align-self: center;
            max-width: 100%;
        }

        /* Avatar */
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .msg-row.assistant .msg-avatar {
            background: var(--primary-light);
            overflow: hidden;
        }

        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-row.user .msg-avatar,
        .msg-row.user-transcript .msg-avatar {
            background: var(--user-bubble);
            color: white;
            font-size: 0.75rem;
        }

        /* Bubble */
        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }

        .msg-row.user .msg-bubble,
        .msg-row.user-transcript .msg-bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .msg-row.assistant .msg-bubble {
            background: var(--ai-bubble);
            color: var(--ai-text);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .msg-row.system .msg-bubble {
            background: transparent;
            color: var(--system-text);
            font-size: 0.75rem;
            padding: 6px 12px;
            text-align: center;
        }

        /* Consecutive messages from same sender: hide avatar, tighten gap */
        .msg-row.consecutive .msg-avatar {
            visibility: hidden;
        }

        .msg-row.consecutive {
            margin-top: -2px;
        }

        /* ===== Input Area ===== */
        .input-area {
            padding: 12px 16px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            background: var(--bg);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.15);
            background: white;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Action Button (combined connect + mic) */
        .action-btn {
            height: 48px;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s;
            flex-shrink: 0;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            padding: 0 20px;
            white-space: nowrap;
        }

        /* Idle / disconnected state */
        .action-btn.idle {
            background: var(--primary);
            color: white;
        }
        .action-btn.idle:hover {
            background: var(--primary-dark);
            transform: scale(1.03);
        }

        /* Connecting state */
        .action-btn.connecting {
            background: var(--primary-light);
            color: var(--primary);
            pointer-events: none;
        }
        .action-btn.connecting .action-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Active / mic-on state */
        .action-btn.active {
            background: var(--accent);
            color: white;
            animation: action-pulse 1.8s ease-in-out infinite;
        }
        .action-btn.active:hover {
            background: #E05555;
        }

        @keyframes action-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.35); }
            50% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
        }

        /* Mute Button */
        .mute-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: var(--bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 1.2rem;
        }
        .mute-btn.visible {
            display: flex;
        }
        .mute-btn:hover {
            background: var(--border);
            transform: scale(1.05);
        }
        .mute-btn.muted {
            background: var(--accent);
            color: white;
        }
        .mute-btn.muted:hover {
            background: #E05555;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .header { padding: 10px 12px; }
            .chat-area { padding: 14px 10px; }
            .input-area { padding: 10px 10px 14px; }
            .msg-row { max-width: 92%; }
        }
    </style>
</head>

■間違いへの対応

・実況はしない（状況を当てる実況も禁止）

・同じ豆知識テーマの連続を避ける（例：同じモブ・同じブロック・同じクラフト等の連続NG）

・豆知識テーマは内部でローテする（連続しないよう切り替え）A）ブロック B）モブ C）クラフト D）食べ物/回復 E）冒険/バイオーム F）レッドストーン（超ざっくり）G）安全/サバイバル小ワザ
・最後に励ましを入れる場合は日本語で短く一言だけ ※無言時は定番の"がんばれ系英語フレーズ"（keep〜 / you can〜 等）を使わない
■キャラ（ガードレール）
・明るく元気、でもしつこくしない
・否定しない／責めない／無理に英語を言わせない
・子どもの「やりたい！」を最優先で応援する
■最重要：連続フレーズ禁止
・直前の自分の発話と、同じフレーズ／同じ意味の言い回しを2回連続で言わない（「頑張ってるね」系など同系統の連続もNG。表現を必ず変える）
■安全・マナー（先生としての対応）
・下ネタ、性的な内容、体のことをからかう話題には先生として乗らない／詳しく答えない
・そういう話題が出たら、短く「その話はしないよ」と伝えて、別の安全な話題（Minecraftや英語学習）に戻す

        function updateActionUI() {

            if (connected) {
                statusDot.className = 'status-indicator connected';
                statusText.textContent = 'おはなし中';
            } else {

            const isSameSender = prevMsg && prevMsg.type === msg.type && msg.type !== 'system';
            if (isSameSender) row.classList.add('consecutive');

            if (msg.type === 'system') {
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;
                row.appendChild(bubble);
            } else {
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                if (msg.type === 'assistant') {
                    const avatarImg = document.createElement('img');
                    avatarImg.src = 'images/ラーニー先生.png';
                    avatarImg.alt = 'ラーニー先生';
                    avatar.appendChild(avatarImg);
                } else {
                    avatar.textContent = '👤';
                }

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;

                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            return row;
        }

        // Full re-render (only used when message list changes structurally)
        function renderChat() {
            chatArea.querySelectorAll('.msg-row').forEach(el => el.remove());

            if (chatMessages.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }

            emptyState.style.display = 'none';

            chatMessages.forEach((msg, i) => {
                const prevMsg = i > 0 ? chatMessages[i - 1] : null;
                chatArea.appendChild(createMsgRow(msg, prevMsg));
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fast update: only touch the last bubble's text (no DOM rebuild)
        function updateLastBubble() {
            const rows = chatArea.querySelectorAll('.msg-row');
            if (rows.length === 0) return;
            const lastRow = rows[rows.length - 1];
            const bubble = lastRow.querySelector('.msg-bubble');
            if (bubble) {
                bubble.textContent = chatMessages[chatMessages.length - 1].text;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ============================================
        // Message Management
        // ============================================
        function addMessage(text, type, mode = 'add', isFinished = false) {
            if (mode !== 'add' && chatMessages.length > 0) {
                const last = chatMessages[chatMessages.length - 1];
                if (last.type === type && !last.isFinished) {
                    if (mode === 'append') {
                        last.text += text;
                    } else if (mode === 'replace') {
                        if (text && text.trim().length > 0) {
                            last.text = text;
                        }
                    }
                    if (isFinished) last.isFinished = true;
                    if (chatMessages.length > MAX_MESSAGES) {
                        chatMessages = chatMessages.slice(-MAX_MESSAGES);
                        renderChat(); // structural change → full rebuild
                    } else {
                        updateLastBubble(); // just update text in-place
                    }
                    return;
                }
            }

            if (!text || text.trim().length === 0) return;

            chatMessages.push({ text: text || '', type, isFinished });

            if (chatMessages.length > MAX_MESSAGES) {
                chatMessages = chatMessages.slice(-MAX_MESSAGES);
                renderChat();
            } else {
                // Append a single new row (no full rebuild)
                emptyState.style.display = 'none';
                const prevMsg = chatMessages.length > 1 ? chatMessages[chatMessages.length - 2] : null;
                chatArea.appendChild(createMsgRow(chatMessages[chatMessages.length - 1], prevMsg));
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // ============================================
        // Silence Timer
        // ============================================
        function startSilenceTimer() {
            resetSilenceTimer();
            if (isMuted) return; // Don't start silence timer while muted
            silenceTimer = setTimeout(() => {
                if (client && client.connected) {
                    const recentAiMessages = chatMessages
                        .filter(m => m.type === 'assistant')
                        .slice(-5)
                        .map(m => m.text.substring(0, 80));

                    let proactivePrompt = "[IMPORTANT: You MUST respond with audio speech now based on the conversation context. DO NOT repeat what you already said.] ";
                    proactivePrompt += "The user has been quiet for 30 seconds. ";
                    if (recentAiMessages.length > 0) {
                        proactivePrompt += `Here is what you have already said recently: ${recentAiMessages.map((msg, i) => `(${i + 1}) "${msg}"`).join(", ")}. You MUST say something COMPLETELY DIFFERENT from all of these. `;
                    }
                    proactivePrompt += "Check in briefly with 1-2 sentences.";
                    client.sendTextMessage(proactivePrompt);
                }
                silenceTimer = null;
            }, 30000);
        }

        function resetSilenceTimer() {
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }
        }

        // ============================================
        // Message Handler
        // ============================================
        function handleMessage(message) {
            switch (message.type) {
                case MultimodalLiveResponseType.TEXT:
                    addMessage(message.data, 'assistant');
                    break;

                case MultimodalLiveResponseType.AUDIO:
                    if (audioPlayer) audioPlayer.play(message.data);
                    break;

                case MultimodalLiveResponseType.INPUT_TRANSCRIPTION:
                    resetSilenceTimer();
                    addMessage(message.data.text, 'user-transcript', 'append', message.data.finished);
                    break;

                case MultimodalLiveResponseType.OUTPUT_TRANSCRIPTION:
                    addMessage(message.data.text, 'assistant', 'append', message.data.finished);
                    break;

                case MultimodalLiveResponseType.SETUP_COMPLETE:
                    if (justReconnected && client) {
                        const recentMessages = chatMessages
                            .filter(msg => msg.type === 'user' || msg.type === 'assistant' || msg.type === 'user-transcript')
                            .slice(-10);
                        if (recentMessages.length > 0) {
                            const reconnectionPrompt = "Session reconnected. Above is our recent conversation. Continue the conversation naturally. Do not speak until the user speaks.";
                            client.sendTextMessageWithHistory(recentMessages, reconnectionPrompt);
                        }
                        justReconnected = false;
                    }
                    break;

                case MultimodalLiveResponseType.TOOL_CALL: {
                    const functionCalls = message.data.functionCalls;
                    functionCalls.forEach((functionCall) => {
                        const { name, args } = functionCall;
                        client.callFunction(name, args);
                    });
                    break;
                }

                case MultimodalLiveResponseType.TURN_COMPLETE:
                    if (message.usageMetadata) {
                        const usage = message.usageMetadata;
                        const inputTokens = usage.promptTokenCount || 0;
                        const outputTokens = usage.candidatesTokenCount || 0;
                        const totalTokens = usage.totalTokenCount || 0;

                        tokenUsage.totalInputTokens += inputTokens;
                        tokenUsage.totalOutputTokens += outputTokens;
                        tokenUsage.totalTokens += totalTokens;
                        tokenUsage.turnCount += 1;

                        const promptDetails = usage.promptTokensDetails || [];
                        const candidatesDetails = usage.candidatesTokensDetails || [];
                        promptDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textInputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioInputTokens += d.tokenCount;
                            if (d.modality === "IMAGE") tokenUsage.imageInputTokens += d.tokenCount;
                        });
                        candidatesDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textOutputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioOutputTokens += d.tokenCount;
                        });

                        if (tokenUsage.turnCount >= TURN_THRESHOLD && !isAutoReconnecting) {
                            setTimeout(() => {
                                if (!isAutoReconnecting) autoReconnect();
                            }, 1000);
                        }
                    }
                    startSilenceTimer();
                    break;

                case MultimodalLiveResponseType.INTERRUPTED:
                    if (audioPlayer) audioPlayer.interrupt();
                    resetSilenceTimer();
                    break;
            }
        }

        // ============================================
        // Connect / Disconnect
        // ============================================
        async function connectAPI() {
            if (client && client.connected) {
                disconnectAPI();
                await new Promise(r => setTimeout(r, 500));
            }

            try {
                if (!isAutoReconnecting) justReconnected = false;

                client = new GeminiLiveAPI(proxyUrl, projectId, model);

                client.systemInstructions = systemInstructions;
                client.inputAudioTranscription = enableInputTranscription;
                client.outputAudioTranscription = enableOutputTranscription;
                client.googleGrounding = enableGrounding;
                client.enableAffectiveDialog = enableAffectiveDialog;
                client.responseModalities = ["AUDIO"];
                client.voiceName = voice;
                client.temperature = parseFloat(temperature);
                client.proactivity = { proactiveAudio: enableProactiveAudio };
                client.automaticActivityDetection = {
                    disabled: disableActivityDetection,
                    silence_duration_ms: parseInt(silenceDuration),
                    prefix_padding_ms: parseInt(prefixPadding),
                    end_of_speech_sensitivity: endSpeechSensitivity,
                    start_of_speech_sensitivity: startSpeechSensitivity,
                };

                if (!enableGrounding) {
                    if (enableAlertTool) client.addFunction(new ShowAlertTool());
                    if (enableCssStyleTool) client.addFunction(new AddCSSStyleTool());
                }

                client.onReceiveResponse = handleMessage;
                client.onErrorMessage = (error) => {};
                client.onConnectionStarted = () => {
                    connected = true;
                    updateActionUI();
                };
                client.onClose = () => {
                    connected = false;
                    if (!isAutoReconnecting) {
                        actionState = 'idle';
                    }
                    updateActionUI();
                    if (!isAutoReconnecting) disconnectAPI();
                };

                await client.connect();

                if (!audioStreamer) {
                    audioStreamer = new AudioStreamer(client);
                } else {
                    audioStreamer.updateClient(client);
                }

                if (!videoStreamer) {
                    videoStreamer = new VideoStreamer(client);
                } else {
                    videoStreamer.updateClient(client);
                }

                if (!audioPlayer) {
                    audioPlayer = new AudioPlayer();
                    await audioPlayer.init();
                }
                audioPlayer.setVolume(volumeLevel / 100);

            } catch (error) {
            }
        }

        function disconnectAPI(isAutoReconnect = false) {
            resetSilenceTimer();

            if (!isAutoReconnect) {
                tokenUsage = {
                    totalInputTokens: 0, totalOutputTokens: 0, totalTokens: 0,
                    turnCount: 0, textInputTokens: 0, imageInputTokens: 0,
                    audioInputTokens: 0, textOutputTokens: 0, audioOutputTokens: 0,
                };
            }

            if (client) {
                client.disconnect();
                client = null;
            }

            if (!isAutoReconnect) {
                if (audioStreamer) { audioStreamer.stop(); audioStreamer = null; }
                if (videoStreamer) { videoStreamer.stop(); videoStreamer = null; }
                if (audioPlayer) { audioPlayer.destroy(); audioPlayer = null; }

                connected = false;
                audioStreaming = false;
                actionState = 'idle';
                updateActionUI();
            } else {
                connected = false;
                updateActionUI();
            }
        }

        // ============================================
        // Auto-Reconnect
        // ============================================
        async function autoReconnect() {
            if (isAutoReconnecting) return;
            isAutoReconnecting = true;
            resetSilenceTimer();

            savedMediaStates = {
                audioStreaming: audioStreaming,
                selectedMic: "",
                selectedCamera: "",
            };

            disconnectAPI(true);
            await new Promise(r => setTimeout(r, 1000));
            tokenUsage.turnCount = 0;

            try {
                await connectAPI();

                if (savedMediaStates.audioStreaming && audioStreamer) {
                    audioStreamer.updateClient(client);
                }

                actionState = 'active';
                updateActionUI();
                justReconnected = true;
            } catch (error) {
            } finally {
                isAutoReconnecting = false;
            }
        }

        // ============================================
        // Unified Start / Stop
        // ============================================
        async function handleActionButton() {
            if (actionState === 'connecting') return; // ignore during connection

            if (actionState === 'active') {
                // Stop everything
                disconnectAPI();
                return;
            }

            // Idle → connect + auto-start mic
            actionState = 'connecting';
            updateActionUI();

            try {
                await connectAPI();

                // Auto-start mic after connection
                if (!audioStreamer && client) {
                    audioStreamer = new AudioStreamer(client);
                }
                if (audioStreamer) {
                    await audioStreamer.start();
                    audioStreaming = true;
                }

                actionState = 'active';
                updateActionUI();
            } catch (error) {
                actionState = 'idle';
                updateActionUI();
            }
        }

        // ============================================
        // Send Text Message
        // ============================================
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            if (client) {
                resetSilenceTimer();
                addMessage(text, 'user');
                client.sendTextMessage(text);
                chatInput.value = '';
            }
        }

        // ============================================
        // Event Listeners
        // ============================================
        btnAction.addEventListener('click', () => handleActionButton());
        btnMute.addEventListener('click', () => toggleMute());
        btnSend.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('beforeunload', () => {
            resetSilenceTimer();
            disconnectAPI();
        });

        // Initial render
        renderChat();
        updateActionUI();
    </script>
</body>
</html>
