        // Build a single message row DOM element
        function createMsgRow(msg, prevMsg) {
            const row = document.createElement('div');
            row.className = `msg-row ${msg.type}`;

            const isSameSender = prevMsg && prevMsg.type === msg.type && msg.type !== 'system';
            if (isSameSender) row.classList.add('consecutive');

            if (msg.type === 'system') {
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;
                row.appendChild(bubble);
            } else {
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                if (msg.type === 'assistant') {
                    const avatarImg = document.createElement('img');
                    avatarImg.src = 'images/ラーニー先生.png';
                    avatarImg.alt = 'ラーニー先生';
                    avatar.appendChild(avatarImg);
                } else {
                    avatar.textContent = '👤';
                }

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;

                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            return row;
        }

        // Full re-render (only used when message list changes structurally)
        function renderChat() {
            chatArea.querySelectorAll('.msg-row').forEach(el => el.remove());

            if (chatMessages.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }

            emptyState.style.display = 'none';

            chatMessages.forEach((msg, i) => {
                const prevMsg = i > 0 ? chatMessages[i - 1] : null;
                chatArea.appendChild(createMsgRow(msg, prevMsg));
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fast update: only touch the last bubble's text (no DOM rebuild)
        function updateLastBubble() {
            const rows = chatArea.querySelectorAll('.msg-row');
            if (rows.length === 0) return;
            const lastRow = rows[rows.length - 1];
            const bubble = lastRow.querySelector('.msg-bubble');
            if (bubble) {
                bubble.textContent = chatMessages[chatMessages.length - 1].text;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ============================================
        // Message Management
        // ============================================
        function addMessage(text, type, mode = 'add', isFinished = false) {
            if (mode !== 'add' && chatMessages.length > 0) {
                const last = chatMessages[chatMessages.length - 1];
                if (last.type === type && !last.isFinished) {
                    if (mode === 'append') {
                        last.text += text;
                    } else if (mode === 'replace') {
                        if (text && text.trim().length > 0) {
                            last.text = text;
                        }
                    }
                    if (isFinished) last.isFinished = true;
                    if (chatMessages.length > MAX_MESSAGES) {
                        chatMessages = chatMessages.slice(-MAX_MESSAGES);
                        renderChat(); // structural change → full rebuild
                    } else {
                        updateLastBubble(); // just update text in-place
                    }
                    return;
                }
            }

            if (!text || text.trim().length === 0) return;

            chatMessages.push({ text: text || '', type, isFinished });

            if (chatMessages.length > MAX_MESSAGES) {
                chatMessages = chatMessages.slice(-MAX_MESSAGES);
                renderChat();
            } else {
                // Append a single new row (no full rebuild)
                emptyState.style.display = 'none';
                const prevMsg = chatMessages.length > 1 ? chatMessages[chatMessages.length - 2] : null;
                chatArea.appendChild(createMsgRow(chatMessages[chatMessages.length - 1], prevMsg));
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // ============================================
        // Silence Timer
        // ============================================
        function startSilenceTimer() {
            resetSilenceTimer();
            if (isMuted) return; // Don't start silence timer while muted
            silenceTimer = setTimeout(() => {
                if (client && client.connected) {
                    const recentAiMessages = chatMessages
                        .filter(m => m.type === 'assistant')
                        .slice(-5)
                        .map(m => m.text.substring(0, 80));

                    let proactivePrompt = "[IMPORTANT: You MUST respond with audio speech now based on the conversation context. DO NOT repeat what you already said.] ";
                    proactivePrompt += "The user has been quiet for 30 seconds. ";
                    if (recentAiMessages.length > 0) {
                        proactivePrompt += `Here is what you have already said recently: ${recentAiMessages.map((msg, i) => `(${i + 1}) "${msg}"`).join(", ")}. You MUST say something COMPLETELY DIFFERENT from all of these. `;
                    }
                    proactivePrompt += "Check in briefly with 1-2 sentences.";
                    if (questSessionActive && activeQuest && !awaitingQuestFarewell) {
                        const next = getRemainingSteps(activeQuest)[0];
                        if (next) {
                            proactivePrompt +=
                                " Beginner level: check in naturally about their Minecraft play. " +
                                "Do NOT repeat English phrase coaching you already said. " +
                                "Gameplay tips or fun facts OK; quest phrase only if they ask.";
                        }
                    }
                    client.sendTextMessage(proactivePrompt);
                }
                silenceTimer = null;
            }, 30000);
        }

        function resetSilenceTimer() {
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }
        }

        async function ensureMicActive() {
            if (!audioStreamer || !audioStreaming || isMuted) return;
            try {
                await audioStreamer.ensureStreaming();
            } catch {
                // ignore resume errors
            }
        }

        // ============================================
        // Message Handler
        // ============================================
        function handleMessage(message, sourceClient = client) {
            switch (message.type) {
                case MultimodalLiveResponseType.TEXT:
                    markFarewellAssistantActivity(sourceClient);
                    markQuestSessionActivity(sourceClient);
                    addMessage(message.data, 'assistant');
                    break;

                case MultimodalLiveResponseType.AUDIO:
                    markFarewellAssistantActivity(sourceClient);
                    markQuestSessionActivity(sourceClient);
                    if (audioPlayer) audioPlayer.play(message.data);
                    break;

                case MultimodalLiveResponseType.INPUT_TRANSCRIPTION:
                    if (sourceClient !== client) break;
                    resetSilenceTimer();
                    ensureMicActive();
                    addMessage(message.data.text, 'user-transcript', 'append', message.data.finished);
                    maybeMatchQuestFromTranscript(message.data.finished);
                    break;

                case MultimodalLiveResponseType.OUTPUT_TRANSCRIPTION:
                    markFarewellAssistantActivity(sourceClient);
                    markQuestSessionActivity(sourceClient);
                    addMessage(message.data.text, 'assistant', 'append', message.data.finished);
                    if (message.data.finished) {
                        tryScheduleFarewellTeardown();
                    }
                    break;

                case MultimodalLiveResponseType.SETUP_COMPLETE:
                    if (justReconnected && client) {
                        const recentMessages = chatMessages
                            .filter(msg => msg.type === 'user' || msg.type === 'assistant' || msg.type === 'user-transcript')
                            .slice(-10);
                        if (recentMessages.length > 0) {
                            const reconnectionPrompt = "Session reconnected. Above is our recent conversation. Continue the conversation naturally. Do not speak until the user speaks.";
                            client.sendTextMessageWithHistory(recentMessages, reconnectionPrompt);
                        }
                        justReconnected = false;
                    }
                    break;

                case MultimodalLiveResponseType.TOOL_CALL: {
                    if (sourceClient !== client) break;
                    const functionCalls = message.data.functionCalls || message.data.function_calls || [];
                    functionCalls.forEach((functionCall) => {
                        const { id, name, args } = functionCall;
                        if (name === 'complete_quest') {
                            const userQuote = args?.user_quote || args?.userQuote || '';
                            const questForTool = activeQuest;
                            const latestUtterance = getLatestUserUtterance(true);

                            if (id && (questCompleting || awaitingQuestFarewell)) {
                                client.sendToolResponse(name, id, {
                                    result: 'quest_recorded',
                                    message: buildQuestAlreadyRecordedToolMessage(),
                                });
                                return;
                            }

                            const acceptedQuote = tryAcceptQuestComplete('tool', userQuote);
                            if (id && acceptedQuote) {
                                client.sendToolResponse(name, id, {
                                    result: 'quest_recorded',
                                    message: buildQuestRecordedToolMessage(questForTool, acceptedQuote),
                                });
                            } else if (id) {
                                client.sendToolResponse(name, id, {
                                    result: 'not_yet',
                                    message: buildQuestRejectedToolMessage(
                                        questForTool || getCurrentQuest(),
                                        latestUtterance
                                    ),
                                });
                            }
                            return;
                        }
                        client.callFunction(name, args);
                        if (id && name) {
                            client.sendToolResponse(name, id, { result: 'ok' });
                        }
                    });
                    break;
                }

                case MultimodalLiveResponseType.TURN_COMPLETE:
                    if (sourceClient !== client) break;
                    if (awaitingQuestFarewell) {
                        tryScheduleFarewellTeardown();
                    } else if (message.usageMetadata) {
                        const usage = message.usageMetadata;
                        const inputTokens = usage.promptTokenCount || 0;
                        const outputTokens = usage.candidatesTokenCount || 0;
                        const totalTokens = usage.totalTokenCount || 0;

                        tokenUsage.totalInputTokens += inputTokens;
                        tokenUsage.totalOutputTokens += outputTokens;
                        tokenUsage.totalTokens += totalTokens;
                        tokenUsage.turnCount += 1;

                        const promptDetails = usage.promptTokensDetails || [];
                        const candidatesDetails = usage.candidatesTokensDetails || [];
                        promptDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textInputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioInputTokens += d.tokenCount;
                            if (d.modality === "IMAGE") tokenUsage.imageInputTokens += d.tokenCount;
                        });
                        candidatesDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textOutputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioOutputTokens += d.tokenCount;
                        });

                        if (tokenUsage.turnCount >= TURN_THRESHOLD && !isAutoReconnecting && !questSessionActive) {
                            setTimeout(() => {
                                if (!isAutoReconnecting && !questSessionActive) autoReconnect();
                            }, 1000);
                        }
                    }
                    if (!questTeardownTimer) {
                        startSilenceTimer();
                    }
                    break;

                case MultimodalLiveResponseType.INTERRUPTED:
                    if (audioPlayer) audioPlayer.interrupt();
                    resetSilenceTimer();
                    break;
            }
        }

        // ============================================
        // Connect / Disconnect
        // ============================================
        async function connectAPI() {
            const quickSwitch = nextConnectQuick;
            nextConnectQuick = false;

            if (quickSwitch) {
                await new Promise((r) => setTimeout(r, 300));
            }

            if (client && client.connected) {
                disconnectAPI(false, quickSwitch, false, quickSwitch && audioStreaming);
                await new Promise((r) => setTimeout(r, quickSwitch ? 250 : 500));
            }

            try {
                if (!isAutoReconnecting) justReconnected = false;

                client = new GeminiLiveAPI(proxyUrl, projectId, model);
                const questForSession = getCurrentQuest();
                configureGeminiClient(client, questForSession);
                attachClientHandlers(client);

                await client.connect();

                if (!audioStreamer) {
                    audioStreamer = new AudioStreamer(client);
                } else {
                    audioStreamer.updateClient(client);
                }

                if (!videoStreamer) {
                    videoStreamer = new VideoStreamer(client);
                } else {
                    videoStreamer.updateClient(client);
                }

                if (!audioPlayer) {
                    audioPlayer = new AudioPlayer();
                    await audioPlayer.init();
                }
                audioPlayer.setVolume(volumeLevel / 100);
            } catch (error) {
                throw error;
            }
        }

        function disconnectAPI(isAutoReconnect = false, keepAudioPlayer = false, preserveQuestAdvance = false, keepMicStreamer = false) {
            resetSilenceTimer();

            if (!isAutoReconnect) {
                if (!preserveQuestAdvance) {
                    clearQuestAdvanceTimer();
                }
                if (!awaitingQuestFarewell) {
                    clearQuestTeardownTimers();
                }
                tokenUsage = {
                    totalInputTokens: 0, totalOutputTokens: 0, totalTokens: 0,
                    turnCount: 0, textInputTokens: 0, imageInputTokens: 0,
                    audioInputTokens: 0, textOutputTokens: 0, audioOutputTokens: 0,
                };
            }

            if (client) {
                intentionalDisconnect = true;
                client.disconnect();
                client = null;
            }

            if (!isAutoReconnect) {
                if (audioStreamer) {
                    if (keepMicStreamer) {
                        audioStreamer.pauseStreaming();
                    } else {
                        audioStreamer.stop();
                        audioStreamer = null;
                        audioStreaming = false;
                    }
                } else if (!keepMicStreamer) {
                    audioStreaming = false;
                }
                if (videoStreamer) { videoStreamer.stop(); videoStreamer = null; }
                if (audioPlayer && !keepAudioPlayer) {
                    audioPlayer.destroy();
                    audioPlayer = null;
                }

                connected = false;
                if (!keepMicStreamer) {
                    audioStreaming = false;
                }
                actionState = 'idle';
                updateActionUI();
            } else {
                connected = false;
                updateActionUI();
            }
        }

        // ============================================
        // Auto-Reconnect
        // ============================================
        async function autoReconnect() {
            if (isAutoReconnecting || questSessionActive) return;
            isAutoReconnecting = true;
            resetSilenceTimer();

            savedMediaStates = {
                audioStreaming: audioStreaming,
                selectedMic: "",
                selectedCamera: "",
            };

            disconnectAPI(true);
            await new Promise(r => setTimeout(r, 1000));
            tokenUsage.turnCount = 0;

            try {
                await connectAPI();

                if (savedMediaStates.audioStreaming && audioStreamer) {
                    audioStreamer.updateClient(client);
                }

                actionState = 'active';
                updateActionUI();
                justReconnected = true;
            } catch (error) {
            } finally {
                isAutoReconnecting = false;
            }
        }

        // ============================================
        // Unified Start / Stop
        // ============================================
        async function handleActionButton() {
            if (actionState === 'connecting') return;

            if (isLessonComplete() && actionState === 'idle') {
                resetProgress();
                renderQuestStars();
                updateQuestBanner();
                updateActionUI();
                return;
            }

            if (actionState === 'active') {
                clearQuestAdvanceTimer();
                clearQuestTeardownTimers();
                cancelPendingNextQuestSession();
                awaitingQuestFarewell = false;
                pendingQuestTeardown = null;
                farewellAssistantSeen = false;
                questCompleting = false;
                questSessionActive = false;
                activeQuest = null;
                disconnectAPI();
                return;
            }

            activeQuest = getCurrentQuest();
            if (!activeQuest) {
                updateQuestBanner();
                updateActionUI();
                return;
            }

            // Idle → connect + auto-start mic
            actionState = 'connecting';
            questSessionActive = true;
            questOpeningSent = false;
            resetQuestSessionState();
            updateActionUI();

            if (clearChatOnNextStart) {
                clearChatOnNextStart = false;
                chatMessages = [];
                renderChat();
                emptyState.style.display = '';
            }

            try {
                await questSfx.ensureContext();
                await connectAPI();

                const micOk = await startMicForSession();
                if (!micOk) {
                    throw new Error('Microphone not ready');
                }

                announceQuestStart();

                actionState = 'active';
                updateActionUI();
            } catch (error) {
                actionState = 'idle';
                questSessionActive = false;
                questOpeningSent = false;
                addMessage('次のクエストへの接続に失敗しました。「はじめる」をもう一度押してください。', 'system');
                disconnectAPI(false, true, false, audioStreaming);
                updateActionUI();
            }
        }

        // ============================================
        // Send Text Message
        // ============================================
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            if (client) {
                resetSilenceTimer();
                addMessage(text, 'user');
                client.sendTextMessage(text);
                chatInput.value = '';
            }
        }

        // ============================================
        // Event Listeners
        // ============================================
        btnAction.addEventListener('click', () => handleActionButton());
        btnMute.addEventListener('click', () => toggleMute());
        btnSend.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('beforeunload', () => {
            resetSilenceTimer();
            cancelPendingNextQuestSession();
            disconnectAPI();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                ensureMicActive();
            }
        });

        // Initial render
        renderChat();
        updateActionUI();
    </script>
</body>
</html>
