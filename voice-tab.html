        function markFarewellAssistantActivity(sourceClient) {
            if (!awaitingQuestFarewell || sourceClient !== farewellSessionClient) return;
            farewellAssistantSeen = true;
            if (farewellNudgeTimer) {
                clearTimeout(farewellNudgeTimer);
                farewellNudgeTimer = null;
            }
        }

        function markQuestSessionActivity(sourceClient) {
            if (!questSessionActive || awaitingQuestFarewell) return;
            if (sourceClient && sourceClient !== client) return;
            questSessionAssistantSeen = true;
            clearQuestOpeningRetry();
            if (questHandoffActive) markQuestHandoffComplete();
        }

        function clearQuestOpeningRetry() {
            if (questOpeningRetryTimer) {
                clearTimeout(questOpeningRetryTimer);
                questOpeningRetryTimer = null;
            }
        }

        function scheduleQuestOpeningRetry() {
            clearQuestOpeningRetry();
            questSessionAssistantSeen = false;
            questOpeningRetryTimer = setTimeout(() => {
                questOpeningRetryTimer = null;
                if (
                    questSessionAssistantSeen ||
                    !questSessionActive ||
                    !client?.connected ||
                    !activeQuest
                ) {
                    return;
                }
                questOpeningSent = false;
                announceQuestStart();
            }, 3500);
        }

        function getAssistantTextSinceFarewell() {
            const slice = chatMessages.slice(chatMessagesAtFarewell);
            return slice
                .filter((m) => m.type === 'assistant' && m.text?.trim())
                .map((m) => m.text)
                .join(' ')
                .length;
        }

        function scheduleQuestTeardownAfterFarewell() {
            if (!awaitingQuestFarewell || !farewellAssistantSeen) return;
            clearQuestTeardownTimers();
            const chars = getAssistantTextSinceFarewell();
            const audioMs = audioPlayer?.getEstimatedPlaybackMsRemaining?.() || 0;
            const delay = Math.min(
                9000,
                Math.max(3200, chars * 85 + 2000, audioMs + 1200)
            );
            const teardown = pendingQuestTeardown;
            if (teardown?.lessonDone) {
                showQuestLoading(
                    'レッスンクリア！',
                    'バッジを準備しています…'
                );
            } else if (teardown?.isNewClear) {
                showQuestLoading(
                    'ミッションクリア！',
                    '次のミッションを準備しています…'
                );
            }
            questTeardownTimer = setTimeout(finalizeQuestTeardown, delay);
        }

        function tryScheduleFarewellTeardown() {
            if (awaitingQuestFarewell && farewellAssistantSeen) {
                scheduleQuestTeardownAfterFarewell();
            }
        }

        function finalizeQuestTeardown() {
            if (!awaitingQuestFarewell || !pendingQuestTeardown) return;
            clearQuestTeardownTimers();

            const { completed, lessonDone, isNewClear } = pendingQuestTeardown;
            awaitingQuestFarewell = false;
            pendingQuestTeardown = null;
            questCompleting = false;

            const keepAudio = !lessonDone;
            questSessionActive = false;
            updateQuestBanner();

            if (lessonDone) {
                hideQuestLoading();
                disconnectAPI(false, keepAudio);
                showQuestModal(completed, true);
                actionState = 'idle';
                updateActionUI();
            } else if (isNewClear) {
                beginNextQuestHandoff(completed);
            } else {
                hideQuestLoading();
                disconnectAPI(false, keepAudio);
                actionState = 'idle';
                updateActionUI();
            }
        }

        function cancelPendingNextQuestSession() {
            if (pendingNextClient) {
                pendingNextClient.disconnect();
                pendingNextClient = null;
            }
            pendingNextConnectPromise = null;
            pendingNextClientReadyAt = 0;
        }

        function adoptPendingNextClient() {
            if (!pendingNextClient) return false;

            const wsOpen = pendingNextClient.webSocket?.readyState === WebSocket.OPEN;
            if (!pendingNextClient.connected || !pendingNextClient.sessionReady || !wsOpen) {
                pendingNextClient.disconnect();
                pendingNextClient = null;
                pendingNextClientReadyAt = 0;
                return false;
            }

            const age = Date.now() - pendingNextClientReadyAt;
            if (age > 12000) {
                pendingNextClient.disconnect();
                pendingNextClient = null;
                pendingNextClientReadyAt = 0;
                return false;
            }

            client = pendingNextClient;
            pendingNextClient = null;
            pendingNextClientReadyAt = 0;
            attachClientHandlers(client);
            connected = true;
            return true;
        }

        function configureGeminiClient(geminiClient, questForSession, { preconnect = false } = {}) {
            geminiClient.functions = [];
            geminiClient.functionsMap = {};
            geminiClient.systemInstructions = buildSessionInstructions(
                questForSession,
                activeQuestSessionIndex ?? getSelectedQuestIndex()
            );
            geminiClient.inputAudioTranscription = enableInputTranscription;
            geminiClient.outputAudioTranscription = enableOutputTranscription;
            geminiClient.googleGrounding = enableGrounding;
            geminiClient.enableAffectiveDialog = enableAffectiveDialog;
            geminiClient.responseModalities = ["AUDIO"];
            geminiClient.voiceName = voice;
            geminiClient.temperature = parseFloat(temperature);
            geminiClient.proactivity = {
                proactiveAudio: preconnect ? false : enableProactiveAudio,
            };
            geminiClient.automaticActivityDetection = {
                disabled: disableActivityDetection,
                silence_duration_ms: parseInt(silenceDuration),
                prefix_padding_ms: parseInt(prefixPadding),
                end_of_speech_sensitivity: endSpeechSensitivity,
                start_of_speech_sensitivity: startSpeechSensitivity,
            };

            if (!enableGrounding) {
                if (enableAlertTool) geminiClient.addFunction(new ShowAlertTool());
                if (enableCssStyleTool) geminiClient.addFunction(new AddCSSStyleTool());
                if (enableQuestTool && questForSession) {
                    geminiClient.addFunction(new CompleteQuestTool());
                    geminiClient.setEnableFunctionCalls(true);
                }
            }
        }

        function attachClientHandlers(geminiClient, { preconnect = false } = {}) {
            geminiClient.onReceiveResponse = (message) => handleMessage(message, geminiClient);
            geminiClient.onErrorMessage = () => {};
            const sessionClient = geminiClient;

            geminiClient.onConnectionStarted = () => {
                if (preconnect) return;
                if (client !== sessionClient) return;
                connected = true;
                updateActionUI();
            };

            geminiClient.onClose = (event) => {
                if (preconnect) {
                    if (pendingNextClient === sessionClient) {
                        pendingNextClient = null;
                    }
                    return;
                }
                if (client !== sessionClient) return;

                connected = false;
                const wasIntentional = intentionalDisconnect;
                intentionalDisconnect = false;

                if (!isAutoReconnecting && !wasIntentional && event && event.code !== 1000) {
                    const reason = (event.reason && String(event.reason).trim()) || `コード ${event.code}`;
                    if (event.code === 1008) {
                        if (/origin/i.test(reason)) {
                            addMessage(`接続できませんでした（${reason}）。カスタムドメインはプロキシの許可オリジンに含め、Cloud Run を再デプロイしてください。`, "system");
                        } else {
                            addMessage(`接続できませんでした（${reason}）。Vertex AI API をプロジェクト ai-sensei-8849b で有効化し、Cloud Run のサービスアカウントに Vertex 利用権限があるか確認してください。`, "system");
                        }
                    } else {
                        addMessage(`接続が切れました（${reason}）`, "system");
                    }
                }
                if (!isAutoReconnecting && !wasIntentional) {
                    actionState = 'idle';
                }
                updateActionUI();
                if (!isAutoReconnecting && !wasIntentional) {
                    disconnectAPI();
                }
            };
        }

        function prepareNextQuestSession() {
            if (pendingNextConnectPromise || pendingNextClient || isLessonComplete()) return;

            const questForSession = getSelectedQuest();
            if (!questForSession) return;

            pendingNextConnectPromise = (async () => {
                try {
                    const nextClient = new GeminiLiveAPI(activeProxyUrl, projectId, model);
                    configureGeminiClient(nextClient, questForSession, { preconnect: true });
                    nextClient.onReceiveResponse = () => {};
                    nextClient.onErrorMessage = () => {};
                    nextClient.onConnectionStarted = () => {};
                    nextClient.onClose = () => {
                        if (pendingNextClient === nextClient) {
                            pendingNextClient = null;
                            pendingNextClientReadyAt = 0;
                        }
                    };
                    await nextClient.connect();
                    if (!awaitingQuestFarewell && !questHandoffActive) {
                        nextClient.disconnect();
                        return;
                    }
                    pendingNextClient = nextClient;
                    pendingNextClientReadyAt = Date.now();
                } catch {
                    pendingNextClient = null;
                    pendingNextClientReadyAt = 0;
                } finally {
                    pendingNextConnectPromise = null;
                }
            })();
        }

        async function connectAPIWithRetry(maxAttempts = 3) {
            let lastError = null;
            for (const proxyCandidate of getProxyFallbackUrls()) {
                activeProxyUrl = proxyCandidate;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    try {
                        if (attempt > 0) {
                            cancelPendingNextQuestSession();
                            if (client) {
                                intentionalDisconnect = true;
                                client.disconnect();
                                client = null;
                                connected = false;
                            }
                            await new Promise((r) => setTimeout(r, 350 + attempt * 250));
                        }
                        nextConnectQuick = attempt > 0;
                    await connectAPI();
                    if (client?.connected && client.webSocket?.readyState === WebSocket.OPEN) {
                        return;
                    }
                    lastError = new Error('Session not ready after connect');
                    } catch (error) {
                        lastError = error;
                    }
                }
            }
            throw lastError || new Error('Connect failed');
        }

        async function beginNextQuestHandoff(completed, { playReadySound = true, pauseBeforeConnect = 0, skipInitialDisconnect = false } = {}) {
            let loadingToken;
            if (questLoadingOverlay?.classList.contains('active')) {
                loadingToken = questLoadingToken;
                if (questLoadingTitle) {
                    questLoadingTitle.textContent = '次のミッションを準備中…';
                }
                if (questLoadingSub) {
                    questLoadingSub.textContent = 'ラーニー先生を呼び出しています';
                    questLoadingSub.hidden = false;
                }
            } else {
                loadingToken = showQuestLoading(
                    '次のミッションを準備中…',
                    'ラーニー先生を呼び出しています'
                );
            }
            showQuestToast(completed);
            setQuestBannerTransitioning(true);
            questHandoffActive = true;
            clearChatOnNextStart = true;

            questSessionActive = false;
            if (!skipInitialDisconnect) {
                disconnectAPI(false, true, false, true, true);
                if (playReadySound) {
                    questSfx.playQuestReady();
                }
                if (pauseBeforeConnect > 0) {
                    await new Promise((r) => setTimeout(r, pauseBeforeConnect));
                }
            }

            actionState = 'connecting';
            questSessionActive = true;
            questOpeningSent = false;
            activeQuest = getSelectedQuest();
            activeQuestSessionIndex = getSelectedQuestIndex();
            resetQuestSessionState();
            if (activeQuestSessionIndex !== null) {
                beginQuestSession(activeQuestSessionIndex);
            }
            updateQuestBanner();
            updateActionUI();

            try {
                if (!audioStreamer?.mediaStream?.active) {
                    await preflightMicAccess();
                }
                prepareNextQuestSession();
                if (pendingNextConnectPromise) {
                    try {
                        await Promise.race([
                            pendingNextConnectPromise,
                            new Promise((r) => setTimeout(r, 2500)),
                        ]);
                    } catch {
                        cancelPendingNextQuestSession();
                    }
                }

                if (!adoptPendingNextClient()) {
                    cancelPendingNextQuestSession();
                    await connectAPIWithRetry(3);
                } else {
                    if (audioStreamer) {
                        audioStreamer.updateClient(client);
                    } else {
                        audioStreamer = new AudioStreamer(client);
                    }
                    if (!videoStreamer) {
                        videoStreamer = new VideoStreamer(client);
                    } else {
                        videoStreamer.updateClient(client);
                    }
                    if (!audioPlayer) {
                        audioPlayer = new AudioPlayer();
                        await audioPlayer.init();
                    }
                    audioPlayer.setVolume(volumeLevel / 100);
                }

                clearChatOnNextStart = false;
                chatMessages = [];
                renderChat();
                emptyState.style.display = '';

                const micOk = await startMicForSession();
                if (!micOk) {
                    throw new Error('Microphone not ready');
                }

                announceQuestStart();
                actionState = 'active';
                updateActionUI();
                hideQuestLoading(loadingToken);
            } catch (error) {
                hideQuestLoading(loadingToken);
                questHandoffActive = false;
                setQuestBannerTransitioning(false);
                questBanner.classList.remove('celebrating');
                actionState = 'idle';
                questSessionActive = false;
                questOpeningSent = false;
                cancelPendingNextQuestSession();
                addMessage(buildConnectErrorMessage(error), 'system');
                disconnectAPI(false, true, false, audioStreaming);
                updateActionUI();
            }
        }

        async function startMicForSession() {
            if (!client?.connected) return false;

            if (!audioStreamer) {
                audioStreamer = new AudioStreamer(client);
            } else {
                audioStreamer.updateClient(client);
            }

            if (audioStreamer.mediaStream?.active && audioStreamer.audioWorklet) {
                audioStreamer.setMuted(isMuted);
                audioStreamer.resumeStreaming();
                audioStreaming = true;
                return audioStreamer.ensureStreaming();
            }

            try {
                await audioStreamer.start();
                audioStreamer.setMuted(isMuted);
                audioStreaming = true;
                return audioStreamer.ensureStreaming();
            } catch {
                return false;
            }
        }

        function resetQuestSessionState() {
            awaitingQuestFarewell = false;
            pendingQuestTeardown = null;
            farewellAssistantSeen = false;
            farewellSessionClient = null;
            questCompleting = false;
            assistantRespondedSinceLastUserTurn = true;
            assistantAudibleThisTurn = false;
            awaitingAssistantReply = false;
            awaitingAssistantSince = 0;
            noAudioRecoveryAttempts = 0;
            lastFinishedUserTranscriptAt = 0;
            pendingQuestTracker = null;
            steeringNudgeSentThisTurn = false;
            falseCreditCorrectionSentThisTurn = false;
            assistantTurnOpen = false;
            deferredSteeringNudges = [];
            pendingFalseCreditAssistantText = '';
            clearDeferredSteeringFlushTimer();
            clearNoAudioRecoveryTimer();
            clearQuestTrackerTimer();
            clearQuestTeardownTimers();
            clearQuestOpeningRetry();
            resolvePostBargeIn();
            staleAssistantOutputUntil = 0;
        }

        function announceQuestStart() {
            if (!client?.connected || !activeQuest || !questSessionActive || questOpeningSent) return;
            questOpeningSent = true;
            const nudge = buildQuestOpeningNudge(activeQuest, activeQuestSessionIndex);
            if (!nudge) return;
            sendClientText(nudge);
            scheduleQuestOpeningRetry();
        }

        function getLatestFinishedUserUtterance() {
            const last = [...chatMessages]
                .reverse()
                .find((m) => m.type === 'user-transcript' && m.isFinished);
            return (last?.text || '').trim();
        }

        /** Latest voice transcript or typed chat message (for silence recovery). */
        function getLatestUserTurnText() {
            for (let i = chatMessages.length - 1; i >= 0; i--) {
                const m = chatMessages[i];
                if (m.type === 'user' && m.text?.trim()) return m.text.trim();
                if (m.type === 'user-transcript' && m.isFinished && m.text?.trim()) {
                    return m.text.trim();
                }
            }
            return '';
        }

        function maybeCorrectPrematureQuestCompleteClaim(assistantText) {
            if (
                !questSessionActive ||
                !activeQuest ||
                questCompleting ||
                awaitingQuestFarewell
            ) {
                return;
            }

            const latestUser = getLatestUserTurnText();
            const falseCredit = assistantFalselyCreditsEnglishStep(
                assistantText,
                activeQuest,
                latestUser,
                activeQuestSessionIndex
            );
            if (falseCredit) {
                reconcileEnglishStepProof(
                    activeQuest,
                    activeQuestSessionIndex,
                    getSessionUserUtterances()
                );
                updateQuestBanner();
                if (completeQuestRejectedTurnSeq === lastUserTurnSeq) return;
                const now = Date.now();
                if (now - lastPrematureCompleteCorrectionAt < 8000) return;
                lastPrematureCompleteCorrectionAt = now;
                const correctionNudge = userMissedEnglishStepPhrase(latestUser, falseCredit)
                    ? buildWrongStepPhraseCorrectionNudge(
                          activeQuest,
                          falseCredit,
                          latestUser,
                          activeQuestSessionIndex
                      )
                    : buildJapaneseOnlyStepCorrectionNudge(
                          activeQuest,
                          falseCredit,
                          latestUser,
                          activeQuestSessionIndex
                      );
                sendSteeringNudge(correctionNudge, { falseCreditCorrection: true });
                return;
            }

            if (isQuestStepsComplete(activeQuest, activeQuestSessionIndex)) {
                return;
            }
            if (!assistantClaimsQuestComplete(assistantText)) return;
            if (completeQuestRejectedTurnSeq === lastUserTurnSeq) return;

            const now = Date.now();
            if (now - lastPrematureCompleteCorrectionAt < 8000) return;
            lastPrematureCompleteCorrectionAt = now;
            sendSteeringNudge(
                buildPrematureCompleteCorrectionNudge(activeQuest, activeQuestSessionIndex)
            );
        }

        function getLatestUserUtterance(includePartial = false) {
            const transcripts = chatMessages.filter((m) => m.type === 'user-transcript');
            if (!transcripts.length) return '';
            const last = transcripts[transcripts.length - 1];
            if (includePartial || last.isFinished) {
                return (last.text || '').trim();
            }
            return '';
        }

        function tryAcceptQuestComplete(source, userQuote = '') {
            if (questCompleting || !activeQuest || !questSessionActive) return null;

            const latest =
                source === 'tool'
                    ? getLatestUserUtterance(true)
                    : getLatestFinishedUserUtterance();
            syncQuestStepsFromSession(latest);

            if (!isQuestStepsComplete(activeQuest, activeQuestSessionIndex)) return null;

            const validation = validateQuestCompletion(
                activeQuest,
                userQuote,
                latest,
                getSessionUserText(),
                activeQuestSessionIndex,
                getSessionUserUtterances()
            );
            if (!validation.ok) return null;

            onQuestComplete(source, validation.userQuote);
            return validation.userQuote;
        }

        function onQuestComplete(source, userQuote = '') {
            if (questCompleting || !activeQuest || !questSessionActive) return;
            questCompleting = true;

            const completed = activeQuest;
            const completedIndex = activeQuestSessionIndex;
            const currentProgress = loadProgress();
            const isNewClear = completedIndex === currentProgress;
            let lessonDone = false;

            if (isNewClear) {
                recordLearnedSteps(
                    completed,
                    completedIndex,
                    completed.steps.map((s) => s.id)
                );
                const nextIndex = currentProgress + 1;
                saveProgress(nextIndex);
                clearStepProgress(completedIndex);
                lessonDone = nextIndex >= getQuests().length;
                awardQuestStar(nextIndex - 1, true);
                if (lessonDone) {
                    recordLessonBadge("lesson1");
                    setSelectedQuestIndex(completedIndex);
                } else {
                    selectNextQuestAfterComplete();
                }
            } else {
                recordLearnedSteps(
                    completed,
                    completedIndex,
                    completed.steps.map((s) => s.id)
                );
            }

            notifyParentProgress();
            notifySelectedQuestUpdate();

            activeQuest = null;
            activeQuestSessionIndex = null;
            awaitingQuestFarewell = true;
            farewellSessionClient = client;
            farewellAssistantSeen = false;
            chatMessagesAtFarewell = chatMessages.length;
            pendingQuestTeardown = { completed, lessonDone, userQuote, isNewClear };
            resetSilenceWatchState();
            stopSilenceWatch();
            clearQuestCompleteFallbackTimer();

            if (lessonDone) {
                questSfx.playLessonComplete();
                cancelPendingNextQuestSession();
            } else {
                questSfx.playQuestComplete();
                prepareNextQuestSession();
            }

            if (client?.connected && source !== 'tool') {
                scheduleFarewellNudgeIfNeeded(completed, userQuote);
            } else if (source === 'tool') {
                scheduleFarewellNudgeIfNeeded(completed, userQuote, { toolPath: true });
            }

            questTeardownFallbackTimer = setTimeout(() => {
                if (awaitingQuestFarewell) {
                    farewellAssistantSeen = true;
                    scheduleQuestTeardownAfterFarewell();
                }
            }, 15000);
        }

        function scheduleFarewellNudgeIfNeeded(completed, userQuote = '', { toolPath = false } = {}) {
            if (farewellNudgeTimer) {
                clearTimeout(farewellNudgeTimer);
                farewellNudgeTimer = null;
            }
            if (assistantAudibleThisTurn) {
                farewellAssistantSeen = true;
                return;
            }
            const delayMs = toolPath ? 5000 : 4500;
            farewellNudgeTimer = setTimeout(() => {
                farewellNudgeTimer = null;
                if (!awaitingQuestFarewell || farewellAssistantSeen || !client?.connected) return;
                if (assistantAudibleThisTurn) {
                    farewellAssistantSeen = true;
                    return;
                }
                sendClientText(buildQuestFarewellNudge(completed, userQuote));
            }, delayMs);
        }

        function maybeMatchQuestFromTranscript(finished) {
            if (!finished || !activeQuest || questCompleting || activeQuestSessionIndex === null) return;
            const utterance = getLatestFinishedUserUtterance();
            const before = new Set(getCompletedStepIds(activeQuestSessionIndex));
            syncQuestStepsAndBanner(utterance);
            const after = getCompletedStepIds(activeQuestSessionIndex);
            const newly = after.filter((id) => !before.has(id));
            if (newly.length) {
                updateQuestBanner();
            }

            if (
                questSessionActive &&
                !questCompleting &&
                !awaitingQuestFarewell &&
                isQuestStepsComplete(activeQuest, activeQuestSessionIndex)
            ) {
                tryAcceptQuestComplete("auto", utterance);
                return;
            }

            if (!client?.connected || !utterance) return;

            if (!shouldSendQuestTracker(utterance, newly)) return;
            scheduleQuestTrackerFromTranscript(utterance, newly);
            if (newly.length) {
                scheduleNoAudioRecovery(utterance, {
                    stepCompleted: true,
                    unclear: isUnrecognizableUserInput(utterance),
                });
            }
        }

        questModalNext.addEventListener('click', () => {
            hideQuestModal();
            questModalConnectLoadingToken = showQuestLoading(
                '次のミッションを準備中…',

            } catch {

            }

        });

        renderQuestStars();
        ensureDefaultMissionSelected();
        updateQuestBanner();

        // ============================================
        // UI Helpers
        // ============================================
        const ICON_PHONE = '<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.97-1.16a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';

        function setActionBtnContent(iconHtml, label) {

        function toggleMute() {
            if (!audioStreamer || !audioStreamer.mediaStream) return;
            isMuted = !isMuted;
            audioStreamer.setMuted(isMuted);

            if (isMuted) {

            } else {
                btnMute.classList.remove('muted');
                btnMute.textContent = '🎙️';

        // Build a single message row DOM element
        function createMsgRow(msg, prevMsg) {
            const row = document.createElement('div');
            row.className = `msg-row ${msg.type}`;

            const isSameSender = prevMsg && prevMsg.type === msg.type && msg.type !== 'system';
            if (isSameSender) row.classList.add('consecutive');

            if (msg.type === 'system') {
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;
                row.appendChild(bubble);
            } else {
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                if (msg.type === 'assistant') {
                    const avatarImg = document.createElement('img');
                    avatarImg.src = 'images/ラーニー先生.png';
                    avatarImg.alt = 'ラーニー先生';
                    avatar.appendChild(avatarImg);
                } else {
                    avatar.textContent = '👤';
                }

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;

                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            return row;
        }

        // Full re-render (only used when message list changes structurally)
        function renderChat() {
            hideAssistantThinking();
            chatArea.querySelectorAll('.msg-row').forEach(el => el.remove());

            if (chatMessages.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }

            emptyState.style.display = 'none';

            chatMessages.forEach((msg, i) => {
                const prevMsg = i > 0 ? chatMessages[i - 1] : null;
                chatArea.appendChild(createMsgRow(msg, prevMsg));
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Fast update: only touch the last bubble's text (no DOM rebuild)
        function updateLastBubble() {
            const rows = chatArea.querySelectorAll('.msg-row');
            if (rows.length === 0) return;
            const lastRow = rows[rows.length - 1];
            const bubble = lastRow.querySelector('.msg-bubble');
            if (bubble) {
                bubble.textContent = chatMessages[chatMessages.length - 1].text;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ============================================
        // Message Management
        // ============================================
        function addMessage(text, type, mode = 'add', isFinished = false) {
            if (type === 'assistant' && text?.trim()) {
                hideAssistantThinking();
            }
            if (mode !== 'add' && chatMessages.length > 0) {
                const last = chatMessages[chatMessages.length - 1];
                if (last.type === type && !last.isFinished) {
                    if (mode === 'append') {
                        last.text += text;
                    } else if (mode === 'replace') {
                        if (text && text.trim().length > 0) {
                            last.text = text;
                        }
                    }
                    if (isFinished) last.isFinished = true;
                    if (chatMessages.length > MAX_MESSAGES) {
                        chatMessages = chatMessages.slice(-MAX_MESSAGES);
                        renderChat(); // structural change → full rebuild
                    } else {
                        updateLastBubble(); // just update text in-place
                    }
                    return;
                }
            }

            if (!text || text.trim().length === 0) return;

            chatMessages.push({ text: text || '', type, isFinished });

            if (chatMessages.length > MAX_MESSAGES) {
                chatMessages = chatMessages.slice(-MAX_MESSAGES);
                renderChat();
            } else {
                // Append a single new row (no full rebuild)
                emptyState.style.display = 'none';
                const prevMsg = chatMessages.length > 1 ? chatMessages[chatMessages.length - 2] : null;
                chatArea.appendChild(createMsgRow(chatMessages[chatMessages.length - 1], prevMsg));
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // ============================================
        // Silence watch — prompt Learny after the child is quiet
        // ============================================
        function shouldMarkSilenceUserSpeech(text, finished) {
            const t = (text || '').trim();
            if (!t || !finished) return false;
            return !isUnrecognizableUserInput(t);
        }

        function buildSilenceProactivePrompt() {
            let proactivePrompt =
                "[Speak now] The child has been quiet for 30 seconds. " +
                "You MUST respond with audible speech now (do not stay silent). " +
                "Do NOT repeat anything you already said this session. ";
            if (questSessionActive && activeQuest && !awaitingQuestFarewell) {
                proactivePrompt =
                    `${buildActiveMissionHeader(activeQuest, activeQuestSessionIndex)}\n` +
                    proactivePrompt +
                    "Gently check in about the current Minecraft step and English phrase — friendly buddy tone (1–2 sentences, EN then JP).";
            } else {
                proactivePrompt +=
                    "Check in with one fun Minecraft tip — casual and upbeat (1–2 sentences, EN then JP).";
            }
            return proactivePrompt;
        }

        function canRunSilenceWatch() {
            return (
                actionState === 'active' &&
                client?.connected &&
                !awaitingQuestFarewell &&
                !questCompleting &&
                !questTeardownTimer
            );
        }

        function resetSilenceWatchState() {
            lastSilenceUserSpeechAt = 0;
            lastSilenceAssistantDoneAt = Date.now();
            lastSilencePromptAt = 0;
        }

        function markSilenceWatchUserActivity() {
            lastSilenceUserSpeechAt = Date.now();
        }

        function markSilenceWatchAssistantDone() {
            lastSilenceAssistantDoneAt = Date.now();
        }

        function silenceWatchQuietMs() {
            const anchor = Math.max(lastSilenceUserSpeechAt, lastSilenceAssistantDoneAt);
            return Date.now() - anchor;
        }

        function tickSilenceWatch() {
            if (!canRunSilenceWatch()) {
                stopSilenceWatch();
                return;
            }

            const quietMs = silenceWatchQuietMs();
            const sincePromptMs = Date.now() - lastSilencePromptAt;
            if (quietMs < SILENCE_PROMPT_MS || sincePromptMs < SILENCE_PROMPT_MS) return;

            lastSilencePromptAt = Date.now();
            lastSilenceAssistantDoneAt = Date.now();
            sendClientText(buildSilenceProactivePrompt());
        }

        function startSilenceWatch() {
            if (silenceWatchId) return;
            silenceWatchId = setInterval(tickSilenceWatch, SILENCE_WATCH_INTERVAL_MS);
        }

        function stopSilenceWatch() {
            if (!silenceWatchId) return;
            clearInterval(silenceWatchId);
            silenceWatchId = null;
        }

        function ensureSilenceWatch() {
            if (canRunSilenceWatch()) startSilenceWatch();
            else stopSilenceWatch();
        }

        async function ensureMicActive() {
            if (!audioStreamer || !audioStreaming) return;
            if (isMuted && !audioStreamer.bargeInStream) return;
            try {
                await audioStreamer.ensureStreaming();
            } catch {
                // ignore resume errors
            }
        }

        // ============================================
        // Message Handler
        // ============================================
        function handleMessage(message, sourceClient = client) {
            switch (message.type) {
                case MultimodalLiveResponseType.TEXT:
                    if (shouldDiscardAssistantOutput()) break;
                    resolvePostBargeIn();
                    markAssistantTurnStarted();
                    markAssistantResponded();
                    markFarewellAssistantActivity(sourceClient);
                    addMessage(message.data, 'assistant');
                    break;

                case MultimodalLiveResponseType.AUDIO:
                    if (shouldDiscardAssistantOutput()) break;
                    resolvePostBargeIn();
                    lastAssistantAudioAt = Date.now();
                    markAssistantAudioReceived();
                    markFarewellAssistantActivity(sourceClient);
                    markQuestSessionActivity(sourceClient);
                    updateBargeInMicStreaming();
                    if (audioPlayer) audioPlayer.play(message.data);
                    break;

                case MultimodalLiveResponseType.INPUT_TRANSCRIPTION:
                    if (sourceClient !== client) break;
                    if (message.data.text?.trim() && assistantOutputActive()) {
                        handleUserBargeIn();
                    }
                    if (
                        !isMuted &&
                        shouldMarkSilenceUserSpeech(
                            message.data.text,
                            message.data.finished
                        )
                    ) {
                        markSilenceWatchUserActivity();
                    }
                    ensureMicActive();
                    addMessage(message.data.text, 'user-transcript', 'append', message.data.finished);
                    if (message.data.finished) {
                        const allowTurn = !isMuted || userBargeInThisTurn;
                        if (allowTurn) {
                            const unclear = handleFinishedUserTranscript();
                            if (!unclear) {
                                maybeMatchQuestFromTranscript(true);
                            }
                        }
                        userBargeInThisTurn = false;
                        updateBargeInMicStreaming();
                    }
                    break;

                case MultimodalLiveResponseType.OUTPUT_TRANSCRIPTION:
                    if (shouldDiscardAssistantOutput()) break;
                    if (message.data.text?.trim()) {
                        resolvePostBargeIn();
                        markAssistantTurnStarted();
                    }
                    markFarewellAssistantActivity(sourceClient);
                    addMessage(message.data.text, 'assistant', 'append', message.data.finished);
                    if (message.data.finished) {
                        pendingFalseCreditAssistantText =
                            chatMessages.length
                                ? chatMessages[chatMessages.length - 1].text
                                : message.data.text;
                        tryScheduleFarewellTeardown();
                        markSilenceWatchAssistantDone();
                        ensureSilenceWatch();
                    }
                    break;

                case MultimodalLiveResponseType.SETUP_COMPLETE:
                    if (
                        questSessionActive &&
                        activeQuest &&
                        !questOpeningSent &&
                        actionState !== "idle"
                    ) {
                        announceQuestStart();
                    }
                    if (justReconnected && client) {
                        const recentMessages = chatMessages
                            .filter(msg => msg.type === 'user' || msg.type === 'assistant' || msg.type === 'user-transcript')
                            .slice(-10);
                        if (recentMessages.length > 0) {
                            const reconnectionPrompt = "Session reconnected. Above is our recent conversation. Continue the conversation naturally. Do not speak until the user speaks.";
                            client.sendTextMessageWithHistory(recentMessages, reconnectionPrompt);
                        }
                        justReconnected = false;
                    }
                    ensureSilenceWatch();
                    break;

                case MultimodalLiveResponseType.TOOL_CALL: {
                    if (sourceClient !== client) break;
                    const functionCalls = message.data.functionCalls || message.data.function_calls || [];
                    functionCalls.forEach((functionCall) => {
                        const { id, name, args } = functionCall;
                        if (name === 'complete_quest') {
                            const userQuote = args?.user_quote || args?.userQuote || '';
                            const questForTool = activeQuest;
                            const latestUtterance = getLatestUserUtterance(true);

                            if (id && (questCompleting || awaitingQuestFarewell)) {
                                client.sendToolResponse(name, id, {
                                    result: 'quest_recorded',
                                    message: buildQuestAlreadyRecordedToolMessage(),
                                });
                                return;
                            }

                            const acceptedQuote = tryAcceptQuestComplete('tool', userQuote);
                            if (id && acceptedQuote) {
                                const alreadySpoke = assistantAudibleThisTurn;
                                client.sendToolResponse(
                                    name,
                                    id,
                                    {
                                        result: 'quest_recorded',
                                        message: buildQuestRecordedToolMessage(
                                            questForTool,
                                            acceptedQuote,
                                            alreadySpoke
                                        ),
                                    },
                                    alreadySpoke ? 'SILENT' : 'WHEN_IDLE'
                                );
                                if (alreadySpoke) {
                                    farewellAssistantSeen = true;
                                }
                            } else if (id) {
                                completeQuestRejectedTurnSeq = lastUserTurnSeq;
                                const quest = questForTool || getSelectedQuest();
                                const questIdx = activeQuestSessionIndex ?? loadProgress();
                                const validation = validateQuestCompletion(
                                    quest,
                                    userQuote,
                                    latestUtterance,
                                    getSessionUserText(),
                                    questIdx,
                                    getSessionUserUtterances()
                                );
                                client.sendToolResponse(name, id, {
                                    result: 'not_yet',
                                    message: buildQuestRejectedToolMessage(
                                        quest,
                                        latestUtterance,
                                        questIdx,
                                        validation.reason || ''
                                    ),
                                });
                            }
                            return;
                        }
                        client.callFunction(name, args);
                        if (id && name) {
                            client.sendToolResponse(name, id, { result: 'ok' });
                        }
                    });
                    break;
                }

                case MultimodalLiveResponseType.TURN_COMPLETE:
                    if (sourceClient !== client) break;
                    if (postBargeInPending) {
                        pendingFalseCreditAssistantText = '';
                        markAssistantTurnEnded({ skipDeferred: true });
                        markSilenceWatchAssistantDone();
                        ensureSilenceWatch();
                        break;
                    }
                    if (pendingFalseCreditAssistantText) {
                        maybeCorrectPrematureQuestCompleteClaim(pendingFalseCreditAssistantText);
                        pendingFalseCreditAssistantText = '';
                    }
                    markAssistantTurnEnded();
                    if (awaitingQuestFarewell) {
                        tryScheduleFarewellTeardown();
                    } else if (message.usageMetadata) {
                        const usage = message.usageMetadata;
                        const inputTokens = usage.promptTokenCount || 0;
                        const outputTokens = usage.candidatesTokenCount || 0;
                        const totalTokens = usage.totalTokenCount || 0;

                        tokenUsage.totalInputTokens += inputTokens;
                        tokenUsage.totalOutputTokens += outputTokens;
                        tokenUsage.totalTokens += totalTokens;
                        tokenUsage.turnCount += 1;

                        const promptDetails = usage.promptTokensDetails || [];
                        const candidatesDetails = usage.candidatesTokensDetails || [];
                        promptDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textInputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioInputTokens += d.tokenCount;
                            if (d.modality === "IMAGE") tokenUsage.imageInputTokens += d.tokenCount;
                        });
                        candidatesDetails.forEach(d => {
                            if (d.modality === "TEXT") tokenUsage.textOutputTokens += d.tokenCount;
                            if (d.modality === "AUDIO") tokenUsage.audioOutputTokens += d.tokenCount;
                        });

                        if (tokenUsage.turnCount >= TURN_THRESHOLD && !isAutoReconnecting && !questSessionActive) {
                            setTimeout(() => {
                                if (!isAutoReconnecting && !questSessionActive) autoReconnect();
                            }, 1000);
                        }
                    }
                    if (
                        !assistantAudibleThisTurn &&
                        awaitingAssistantReply &&
                        lastFinishedUserTranscriptAt &&
                        Date.now() - lastFinishedUserTranscriptAt < 12000
                    ) {
                        const utterance = getLatestUserTurnText();
                        scheduleNoAudioRecovery(utterance, {
                            unclear: isUnrecognizableUserInput(utterance),
                        });
                    }
                    markSilenceWatchAssistantDone();
                    ensureSilenceWatch();
                    break;

                case MultimodalLiveResponseType.INTERRUPTED:
                    assistantTurnOpen = false;
                    updateBargeInMicStreaming();
                    const appCausedInterrupt = Date.now() - lastAppSteeringInjectAt < 900;
                    if (!appCausedInterrupt) {
                        userBargeInThisTurn = true;
                        armPostBargeInWatchdog();
                        bumpStaleAssistantOutputWindow();
                        finalizeInterruptedAssistantMessage();
                        assistantAudibleThisTurn = false;
                        lastAssistantAudioAt = 0;
                        pendingFalseCreditAssistantText = '';
                        pendingQuestTracker = null;
                        clearQuestTrackerTimer();
                        deferredSteeringNudges = [];
                        clearDeferredSteeringFlushTimer();
                        clearNoAudioRecoveryTimer();
                        if (audioPlayer) audioPlayer.interrupt();
                    } else {
                        scheduleDeferredSteeringFlush(700);
                    }
                    break;
            }
        }

        // ============================================
        // Connect / Disconnect
        // ============================================
        async function connectAPI() {
            const quickSwitch = nextConnectQuick;
            nextConnectQuick = false;

            if (quickSwitch) {
                await new Promise((r) => setTimeout(r, 450));
            }

            if (client && client.connected) {
                disconnectAPI(false, quickSwitch, false, quickSwitch && audioStreaming);
                await new Promise((r) => setTimeout(r, quickSwitch ? 400 : 500));
            }

            try {
                if (!isAutoReconnecting) justReconnected = false;

                client = new GeminiLiveAPI(activeProxyUrl, projectId, model);
                const questForSession = activeQuest ?? getSelectedQuest();
                configureGeminiClient(client, questForSession);
                attachClientHandlers(client);

                await client.connect();

                if (!audioStreamer) {
                    audioStreamer = new AudioStreamer(client);
                } else {
                    audioStreamer.updateClient(client);
                }

                if (!videoStreamer) {
                    videoStreamer = new VideoStreamer(client);
                } else {
                    videoStreamer.updateClient(client);
                }

                if (!audioPlayer?.isInitialized) {
                    audioPlayer = audioPlayer || new AudioPlayer();
                    await audioPlayer.init();
                }
                audioPlayer.setVolume(volumeLevel / 100);
            } catch (error) {
                throw error;
            }
        }

        function disconnectAPI(isAutoReconnect = false, keepAudioPlayer = false, preserveQuestAdvance = false, keepMicStreamer = false, preserveActionState = false) {
            stopSilenceWatch();
            resolvePostBargeIn();
            staleAssistantOutputUntil = 0;
            clearNoAudioRecoveryTimer();
            clearQuestTrackerTimer();
            pendingQuestTracker = null;
            if (!isAutoReconnect) {
                endQuestSession();
            }

            if (!isAutoReconnect) {
                if (!preserveQuestAdvance) {
                    clearQuestAdvanceTimer();
                }
                if (!awaitingQuestFarewell) {
                    clearQuestTeardownTimers();
                }
                tokenUsage = {
                    totalInputTokens: 0, totalOutputTokens: 0, totalTokens: 0,
                    turnCount: 0, textInputTokens: 0, imageInputTokens: 0,
                    audioInputTokens: 0, textOutputTokens: 0, audioOutputTokens: 0,
                };
            }

            if (client) {
                intentionalDisconnect = true;
                client.disconnect();
                client = null;
            }

            if (!isAutoReconnect) {
                if (audioStreamer) {
                    if (keepMicStreamer) {
                        audioStreamer.pauseStreaming();
                    } else {
                        audioStreamer.stop();
                        audioStreamer = null;
                        audioStreaming = false;
                    }
                } else if (!keepMicStreamer) {
                    audioStreaming = false;
                }
                if (videoStreamer) { videoStreamer.stop(); videoStreamer = null; }
                if (audioPlayer && !keepAudioPlayer) {
                    audioPlayer.destroy();
                    audioPlayer = null;
                }

                connected = false;
                if (!keepMicStreamer) {
                    audioStreaming = false;
                }
                if (!preserveActionState) {
                    actionState = 'idle';
                }
                updateActionUI();
            } else {
                connected = false;
                updateActionUI();
            }
        }

        // ============================================
        // Auto-Reconnect
        // ============================================
        async function autoReconnect() {
            if (isAutoReconnecting || questSessionActive) return;
            isAutoReconnecting = true;
            stopSilenceWatch();

            savedMediaStates = {
                audioStreaming: audioStreaming,
                selectedMic: "",
                selectedCamera: "",
            };

            disconnectAPI(true);
            await new Promise(r => setTimeout(r, 1000));
            tokenUsage.turnCount = 0;

            try {
                await connectAPI();

                if (savedMediaStates.audioStreaming && audioStreamer) {
                    audioStreamer.updateClient(client);
                }

                actionState = 'active';
                updateActionUI();
                justReconnected = true;
            } catch (error) {
            } finally {
                isAutoReconnecting = false;
            }
        }

        // ============================================
        // Unified Start / Stop
        // ============================================
        async function handleActionButton() {
            if (actionState === 'connecting') {
                resetIdleCallState();
                disconnectAPI();
                actionState = 'idle';
                updateActionUI();
                return;
            }

            if (actionState === 'active') {
                resetIdleCallState();
                disconnectAPI();
                actionState = 'idle';
                updateActionUI();
                return;
            }

            activeQuest = getSelectedQuest();
            activeQuestSessionIndex = activeQuest ? getSelectedQuestIndex() : null;
            questSessionActive = !!activeQuest;

            actionState = 'connecting';
            questOpeningSent = false;
            resetQuestSessionState();
            updateActionUI();

            clearConversationHistory();

            if (activeQuestSessionIndex !== null) {
                beginQuestSession(activeQuestSessionIndex);
                updateQuestBanner();
            }

            if (clearChatOnNextStart) {
                clearChatOnNextStart = false;
            }

            try {
                await preflightMicAccess();
                await preflightAudioOutput();
                await ensureStaleConnectionClosed({ keepMic: true });
                await questSfx.ensureContext();
                await connectAPI();

                const micOk = await startMicForSession();
                if (!micOk) {
                    throw new Error('Microphone not ready');
                }

                if (activeQuest) {
                    announceQuestStart();
                }

                actionState = 'active';
                updateActionUI();
                resetSilenceWatchState();
                ensureSilenceWatch();
                clearQuestModalConnectLoading();
            } catch (error) {
                logConnectFailure(error, "handleActionButton");
                resetIdleCallState();
                actionState = 'idle';
                addMessage(buildConnectErrorMessage(error), 'system');
                disconnectAPI(false, true, false, false);
                updateActionUI();
                clearQuestModalConnectLoading();
            }
        }

        // ============================================
        // Send Text Message
        // ============================================
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            if (client) {
                markSilenceWatchUserActivity();
                resolvePostBargeIn();
                markUserTurnStarted();
                addMessage(text, 'user');
                showAssistantThinking();

                let newly = [];
                if (activeQuest && !questCompleting && activeQuestSessionIndex !== null) {
                    const before = new Set(getCompletedStepIds(activeQuestSessionIndex));
                    syncQuestStepsAndBanner(text);
                    const after = getCompletedStepIds(activeQuestSessionIndex);
                    newly = after.filter((id) => !before.has(id));
                    if (newly.length) updateQuestBanner();
                }

                const payload = buildTypedUserTurnPayload(text, newly);
                const usedGroundTruth = payload !== text;
                if (!sendClientText(payload)) {
                    hideAssistantThinking();
                    awaitingAssistantReply = false;
                    addMessage('接続の準備中です。少し待ってからもう一度送ってね。', 'system');
                    return;
                }
                if (usedGroundTruth) markSteeringNudgeSent();

                chatInput.value = '';
                lastFinishedUserTranscriptAt = Date.now();

                if (
                    questSessionActive &&
                    !questCompleting &&
                    !awaitingQuestFarewell &&
                    activeQuest &&
                    isQuestStepsComplete(activeQuest, activeQuestSessionIndex)
                ) {
                    tryAcceptQuestComplete('auto', text);
                } else if (!usedGroundTruth) {
                    syncQuestFromUserText(text);
                }

                scheduleNoAudioRecovery(text, {
                    unclear: isUnrecognizableUserInput(text),
                    stepCompleted: newly.length > 0,
                });
            }
        }

        // ============================================
        // Event Listeners
        // ============================================
        btnAction.addEventListener('click', () => handleActionButton());
        btnMute.addEventListener('click', () => toggleMute());
        btnSend.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('beforeunload', () => {
            stopSilenceWatch();
            cancelPendingNextQuestSession();
            disconnectAPI();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                ensureMicActive();
            }
        });

        window.addEventListener('message', handleParentMessage);

        // Initial render
        renderChat();
        updateActionUI();
        notifySelectedQuestUpdate();
    </script>
</body>
